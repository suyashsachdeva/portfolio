<script>
  /* Set theme before first paint to avoid any flash. Default: dark. */
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (t !== 'light' && t !== 'dark') {
        t = 'dark'; /* portfolio's signature look stays the default */
      }
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<style>
  /* ── PRE-REACT LOADER ── inlined so it paints on first byte ───────── */
  :root {
    --ld-bg:     oklch(13% 0.02 260);
    --ld-ink:    oklch(94% 0.012 85);
    --ld-mute:   oklch(60% 0.014 260);
    --ld-accent: oklch(82% 0.12 75);
    --ld-line:   oklch(94% 0.012 85 / 0.16);
  }
  #loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: radial-gradient(ellipse at 50% 45%, oklch(16% 0.022 260) 0%, oklch(11% 0.02 260) 70%);
    display: grid;
    place-items: center;
    transition: opacity .55s ease, visibility .55s;
    font-family: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ld-ink);
  }
  #loader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  .ld-stack { display: flex; flex-direction: column; align-items: center; gap: 32px; }
  .ld-nn {
    width: 240px;
    height: 144px;
    overflow: visible;
  }
  .ld-nn .ld-edge {
    stroke: var(--ld-line);
    stroke-width: 1;
    fill: none;
  }
  .ld-nn .ld-edge.lit {
    stroke: var(--ld-accent);
    stroke-opacity: 0.85;
    stroke-width: 1.3;
    filter: drop-shadow(0 0 4px var(--ld-accent));
  }
  .ld-nn .ld-node {
    fill: var(--ld-bg);
    stroke: oklch(70% 0.02 260);
    stroke-width: 1;
  }
  .ld-nn .ld-node.lit {
    fill: var(--ld-accent);
    stroke: var(--ld-accent);
    filter: drop-shadow(0 0 8px var(--ld-accent));
  }
  .ld-nn .ld-wave {
    stroke: var(--ld-accent);
    stroke-width: 1.2;
    opacity: 0;
  }
  .ld-nn .ld-wave.on {
    opacity: 0.6;
  }
  .ld-nn .ld-wave-glow {
    stroke: var(--ld-accent);
    stroke-width: 14;
    opacity: 0;
  }
  .ld-nn .ld-wave-glow.on {
    opacity: 0.16;
  }

  /* L0 nodes light on tick 0, L1 on tick 1, L2 on tick 2 (cycle of 3) */
  /* edges L0→L1 light at ticks 0–1; L1→L2 at ticks 1–2 */
  .ld-nn[data-t="0"] .ld-node.l0,
  .ld-nn[data-t="1"] .ld-node.l1,
  .ld-nn[data-t="2"] .ld-node.l2 { animation: ld-pop 0.6s ease-out; }
  @keyframes ld-pop {
    0%   { fill: var(--ld-bg);     stroke: oklch(70% 0.02 260); transform: scale(1); }
    25%  { fill: var(--ld-accent); stroke: var(--ld-accent);    transform: scale(1.35); }
    100% { fill: var(--ld-bg);     stroke: oklch(70% 0.02 260); transform: scale(1); }
  }
  .ld-nn .ld-node { transform-origin: center; transform-box: fill-box; transition: fill .2s, stroke .2s; }

  .ld-meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    min-width: 280px;
  }
  .ld-title {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ld-accent);
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .ld-title::before,
  .ld-title::after {
    content: "";
    width: 24px;
    height: 1px;
    background: var(--ld-accent);
    opacity: 0.7;
  }
  .ld-bar {
    width: 240px;
    height: 1px;
    background: var(--ld-line);
    position: relative;
    overflow: hidden;
  }
  .ld-bar::before {
    content: "";
    position: absolute;
    top: 0; left: -40%;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, var(--ld-accent), transparent);
    animation: ld-sweep 1.6s ease-in-out infinite;
  }
  @keyframes ld-sweep {
    0%   { left: -40%; }
    100% { left: 100%; }
  }
  .ld-status {
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ld-mute);
    min-height: 14px;
    text-align: center;
  }
  .ld-status .ld-dots::after {
    content: "";
    display: inline-block;
    width: 1em;
    text-align: left;
    animation: ld-dots 1.4s steps(4, end) infinite;
  }
  @keyframes ld-dots {
    0%   { content: ""; }
    25%  { content: "."; }
    50%  { content: ".."; }
    75%  { content: "..."; }
  }
  .ld-sig {
    font-family: "Newsreader", Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: var(--ld-mute);
    letter-spacing: 0.01em;
    margin-top: -6px;
    opacity: 0.7;
  }
</style>
<style>
  :root {
    --bg:        oklch(13% 0.02 260);
    --bg-soft:   oklch(16% 0.022 260);
    --bg-card:   oklch(17% 0.024 260);
    --ink:       oklch(94% 0.012 85);
    --ink-mute:  oklch(78% 0.014 85);
    --ink-dim:   oklch(60% 0.014 260);
    --line:      oklch(94% 0.012 85 / 0.14);
    --line-soft: oklch(94% 0.012 85 / 0.07);
    --accent:    oklch(82% 0.12 75);
    --accent-d:  oklch(70% 0.13 70);
    --on-accent: oklch(20% 0.04 60);
    --serif: "Newsreader", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --sans:  "Geist", ui-sans-serif, system-ui, sans-serif;
    --mono:  "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --maxw: 1180px;
    --pad:  clamp(20px, 4vw, 56px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 400;
    font-size: 15.5px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ─── Neural backdrop ───────────────────────────────────────────────── */
  .cosmos {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(1100px 720px at 82% -10%, oklch(38% 0.09 260 / 0.38), transparent 60%),
      radial-gradient(900px 600px at 8% 110%, oklch(38% 0.08 30 / 0.18), transparent 60%),
      linear-gradient(180deg, oklch(13% 0.02 260) 0%, oklch(11% 0.022 260) 100%);
  }
  .cosmos::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(oklch(94% 0.01 85 / 0.025) 1px, transparent 1px),
      linear-gradient(90deg, oklch(94% 0.01 85 / 0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask: radial-gradient(ellipse at center, black 20%, transparent 80%);
  }
  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── Page frame ────────────────────────────────────────────────────── */
  #root { position: relative; z-index: 2; }
  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding-left: var(--pad);
    padding-right: var(--pad);
  }

  /* ─── Nav ───────────────────────────────────────────────────────────── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: oklch(13% 0.02 260 / 0.65);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .brand {
    font-family: var(--serif);
    font-size: 22px;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    white-space: nowrap;
  }
  .brand .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 8px 3px 0;
    vertical-align: middle;
    box-shadow: 0 0 12px var(--accent);
  }
  .nav-links {
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .nav-links a {
    color: var(--ink-mute);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.04em;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.active { color: var(--accent); }
  .nav-actions {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .nav-cta {
    border: 1px solid var(--line);
    padding: 8px 16px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    transition: all .2s;
  }
  .nav-cta:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  @media (max-width: 720px) {
    .nav-links { display: none; }
  }

  /* ─── Section heads ─────────────────────────────────────────────────── */
  section { padding: 96px 0; position: relative; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .eyebrow::before {
    content: "";
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .sec-title {
    font-family: var(--serif);
    font-size: clamp(34px, 4.6vw, 52px);
    font-weight: 400;
    line-height: 1.08;
    letter-spacing: -0.015em;
    margin: 0 0 16px;
  }
  .sec-sub {
    color: var(--ink-mute);
    font-size: 16px;
    max-width: 56ch;
    margin: 0;
  }
  .sec-head {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 48px;
  }

  /* ─── Hero ──────────────────────────────────────────────────────────── */
  .hero {
    padding: 56px 0 64px;
    position: relative;
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    align-items: center;
    width: 100%;
  }
  @media (max-width: 980px) {
    .hero { min-height: 0; padding: 40px 0 56px; }
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  }
  .hero-left { min-width: 0; }
  .hero-meta {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    align-items: center;
  }
  .hero-meta .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: oklch(72% 0.14 145);
    box-shadow: 0 0 0 0 oklch(72% 0.14 145 / 0.6);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 oklch(72% 0.14 145 / 0.55); }
    70%  { box-shadow: 0 0 0 10px oklch(72% 0.14 145 / 0); }
    100% { box-shadow: 0 0 0 0 oklch(72% 0.14 145 / 0); }
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(40px, 5.2vw, 68px);
    line-height: 1.04;
    letter-spacing: -0.02em;
    margin: 0 0 24px;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .hero-tag {
    color: var(--ink-mute);
    font-size: 18px;
    line-height: 1.6;
    max-width: 52ch;
    margin: 0 0 32px;
  }

  /* Rotating hero tagline */
  .hero-tag-wrap {
    position: relative;
    margin: 0 0 40px;
    max-width: 52ch;
    min-height: 172px;
  }
  .hero-tag-wrap .hero-tag {
    position: absolute;
    top: 0; left: 0; right: 0;
    margin: 0;
    padding: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .55s ease, transform .55s ease;
    pointer-events: none;
  }
  .hero-tag-wrap .hero-tag.in {
    opacity: 1;
    transform: none;
    pointer-events: auto;
  }
  .hero-tag-lbl {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    padding-left: 18px;
    position: relative;
  }
  .hero-tag-lbl::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    width: 12px; height: 1px;
    background: var(--accent);
  }
  .hero-tag-wrap .hero-tag p {
    font-family: var(--serif);
    color: var(--ink);
    font-size: clamp(17px, 1.45vw, 21px);
    line-height: 1.45;
    margin: 0;
    text-wrap: pretty;
    letter-spacing: -0.005em;
    max-width: 52ch;
  }
  .hero-tag-dots {
    position: absolute;
    left: 0;
    bottom: -24px;
    display: flex;
    gap: 8px;
  }
  .htd {
    width: 28px; height: 2px;
    background: var(--line);
    border: 0;
    padding: 0;
    cursor: pointer;
    transition: background .25s, transform .25s;
  }
  .htd.active { background: var(--accent); }
  .htd:hover { background: var(--ink-mute); transform: scaleY(1.6); }
  .htd.active:hover { background: var(--accent); }

  /* Architecture slideshow */
  .arch-slide {
    position: relative;
    background: oklch(15% 0.02 260 / 0.5);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    max-width: 540px;
    margin: 0 auto;
    width: 100%;
  }
  .arch-slide::before {
    content: "";
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .arch-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .arch-head .arch-tag {
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 9.5px;
  }
  .arch-tag-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    transition: background .2s, color .2s, transform .2s;
  }
  .arch-tag-link:hover {
    background: var(--accent);
    color: var(--on-accent);
    transform: translateY(-1px);
  }
  .arch-tag-link svg { opacity: 0.7; }
  .arch-tag-link:hover svg { opacity: 1; }

  .arch-colab {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 8px;
    color: var(--ink-mute);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 12px 7px 13px;
    border: 1px solid var(--line);
    border-radius: 999px;
    align-self: flex-start;
    transition: all .2s;
    background: oklch(13% 0.02 260 / 0.5);
  }
  .arch-colab:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .arch-colab svg { opacity: 0.65; transition: opacity .2s, transform .2s; }
  .arch-colab:hover svg { opacity: 1; transform: translate(1px, -1px); }
  .arch-canvas {
    width: 100%;
    aspect-ratio: 23 / 15;
    display: grid;
    place-items: center;
  }
  .arch-canvas svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .arch-foot {
    min-height: 76px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .arch-name {
    font-family: var(--serif);
    font-size: 22px;
    line-height: 1.15;
    color: var(--ink);
  }
  .arch-desc {
    color: var(--ink-mute);
    font-size: 13px;
    line-height: 1.5;
    text-wrap: pretty;
  }
  .arch-dots {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .arch-dot {
    flex: 1;
    height: 2px;
    background: var(--line);
    border: 0;
    padding: 0;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background .2s;
  }
  .arch-dot:hover { background: var(--ink-mute); }
  .arch-dot.done { background: var(--ink-mute); }
  .arch-dot .arch-dot-fill {
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
  }
  .arch-dot.active .arch-dot-fill {
    animation: arch-fill 5.2s linear forwards;
  }
  @keyframes arch-fill {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
  .hero-cta-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 22px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
    cursor: pointer;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
  }
  .btn.primary {
    background: var(--accent);
    color: var(--on-accent);
    border-color: var(--accent);
  }
  .btn.primary:hover {
    background: transparent;
    color: var(--accent);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn .arrow { transition: transform .2s; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* hero neural net */
  .orbit-wrap {
    position: relative;
    aspect-ratio: 1;
    display: grid;
    place-items: center;
  }
  .nn-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .nn-svg .edge {
    stroke: var(--line);
    stroke-width: 0.6;
    fill: none;
  }
  .nn-svg .edge.hot {
    stroke: var(--accent);
    stroke-width: 0.9;
    opacity: 0.7;
  }
  .nn-svg .node {
    fill: var(--bg);
    stroke: var(--ink-mute);
    stroke-width: 0.8;
  }
  .nn-svg .node.in    { stroke: var(--ink-mute); }
  .nn-svg .node.hidden{ stroke: var(--accent-d); }
  .nn-svg .node.out   {
    fill: var(--accent);
    stroke: var(--accent);
    filter: drop-shadow(0 0 8px oklch(82% 0.12 75 / 0.5));
  }
  .nn-svg .layer-label,
  .arch-canvas svg .layer-label {
    font-family: var(--mono);
    font-size: 6px;
    letter-spacing: 0.22em;
    fill: var(--ink-dim);
    text-transform: uppercase;
  }
  .nn-svg .activation {
    fill: var(--accent);
  }
  @keyframes pulseNode {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }
  .nn-svg .node.live { animation: pulseNode 3.2s ease-in-out infinite; }
  .nn-svg .node.live.d1 { animation-delay: .4s; }
  .nn-svg .node.live.d2 { animation-delay: .8s; }
  .nn-svg .node.live.d3 { animation-delay: 1.2s; }
  .nn-svg .node.live.d4 { animation-delay: 1.6s; }
  @keyframes flow {
    0%   { stroke-dashoffset: 60; opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }
  .nn-svg .signal {
    stroke: var(--accent);
    stroke-width: 1.1;
    fill: none;
    stroke-dasharray: 4 56;
    animation: flow 3.6s linear infinite;
  }
  .nn-svg .signal.s2 { animation-delay: 1.2s; }
  .nn-svg .signal.s3 { animation-delay: 2.4s; }
  .nn-svg .signal.s4 { animation-delay: 0.6s; }
  .nn-svg .signal.s5 { animation-delay: 1.8s; }

  /* ─── About ─────────────────────────────────────────────────────────── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 80px;
    align-items: start;
  }
  @media (max-width: 880px) {
    .about-grid { grid-template-columns: 1fr; gap: 40px; }
  }
  .about-body p {
    font-family: var(--serif);
    font-size: clamp(22px, 2.4vw, 28px);
    line-height: 1.45;
    font-weight: 400;
    margin: 0 0 24px;
    color: var(--ink);
  }
  .about-body p + p { font-size: 17px; font-family: var(--sans); color: var(--ink-mute); line-height: 1.7; }
  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px 24px;
    padding-top: 16px;
  }
  .stat .n {
    font-family: var(--serif);
    font-size: 44px;
    line-height: 1;
    color: var(--accent);
    display: block;
    margin-bottom: 6px;
  }
  .stat .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  /* ─── Experience ────────────────────────────────────────────────────── */
  .exp-list { display: grid; gap: 0; }

  /* ── organisation block — the org name is ALWAYS on top, whether it
        holds one role or several, so the section reads consistently ── */
  .exp-org {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 40px;
    padding: 38px 0;
    border-top: 1px solid var(--line);
  }
  .exp-org:last-child { border-bottom: 1px solid var(--line); }
  .exp-org-head {
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: sticky;
    top: 92px;
    align-self: start;
  }
  .exp-org-co {
    font-family: var(--serif);
    font-size: 25px;
    font-weight: 400;
    line-height: 1.16;
    margin: 0;
    color: var(--ink);
  }
  a.exp-org-co.lnk { background-size: 0% 1px; background-image: linear-gradient(var(--phase, var(--accent)), var(--phase, var(--accent))); }
  a.exp-org-co.lnk:hover { background-size: 100% 1px; color: var(--phase, var(--accent)); }
  .exp-org-range {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .exp-org-count {
    color: var(--phase, var(--accent));
    font-size: 10px;
    letter-spacing: 0.16em;
  }

  /* ── roles within an org: a quiet vertical timeline ── */
  .exp-roles { position: relative; }
  .exp-roles.multi::before {
    content: "";
    position: absolute;
    left: 4px; top: 9px; bottom: 9px;
    width: 1px;
    background: var(--line);
  }
  .exp-role-item { position: relative; padding-left: 28px; }
  .exp-roles:not(.multi) .exp-role-item { padding-left: 0; }
  .exp-role-item + .exp-role-item { margin-top: 30px; }
  .exp-roles.multi .exp-role-item::before {
    content: "";
    position: absolute;
    left: 0; top: 7px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.5px solid var(--ink-dim);
    z-index: 1;
  }
  .exp-roles.multi .exp-role-item:first-child::before {
    background: var(--phase, var(--accent));
    border-color: var(--phase, var(--accent));
    box-shadow: 0 0 10px var(--phase, var(--accent));
  }
  .exp-role-title {
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 400;
    line-height: 1.25;
    margin: 0 0 6px;
    color: var(--ink);
    display: inline-block;
  }
  a.exp-role-title.lnk { background-size: 0% 1px; background-image: linear-gradient(var(--phase, var(--accent)), var(--phase, var(--accent))); }
  a.exp-role-title.lnk:hover { background-size: 100% 1px; color: var(--phase, var(--accent)); }
  .exp-role-meta {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--ink-mute);
    margin-bottom: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
    align-items: center;
  }
  .exp-role-sep { color: var(--ink-dim); opacity: 0.6; }
  .exp-bullets {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .exp-bullets li {
    color: var(--ink-mute);
    font-size: 15px;
    line-height: 1.6;
    padding-left: 18px;
    position: relative;
    margin-bottom: 6px;
  }
  .exp-bullets li::before {
    content: "";
    position: absolute;
    left: 0; top: 11px;
    width: 8px;
    height: 1px;
    background: var(--accent);
  }
  .exp-role-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-mute);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  @media (max-width: 880px) {
    .exp-org { grid-template-columns: 1fr; gap: 18px; }
    .exp-org-head { position: static; flex-direction: row; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; }
    .exp-org-range { flex-direction: row; gap: 12px; }
  }

  /* ─── Research ──────────────────────────────────────────────────────── */
  .tabs {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 999px;
    margin-bottom: 40px;
  }
  .tab {
    background: transparent;
    border: 0;
    color: var(--ink-mute);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .2s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    background: var(--accent);
    color: var(--on-accent);
  }
  .pub-list { display: grid; gap: 0; }
  .pub {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 24px;
    padding: 24px 0;
    border-top: 1px solid var(--line);
    cursor: default;
    transition: background .3s;
  }
  .pub:last-child { border-bottom: 1px solid var(--line); }
  .pub:hover { background: oklch(94% 0.012 85 / 0.025); }
  .pub-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    padding-top: 6px;
  }
  .pub-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    line-height: 1.3;
    margin: 0 0 8px;
    transition: color .2s;
  }
  .pub:hover .pub-title { color: var(--accent); }
  .pub-venue {
    color: var(--ink-mute);
    font-size: 14px;
    font-style: italic;
  }
  .pub-status {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding-top: 8px;
    white-space: nowrap;
  }
  .pub-status.published { color: oklch(75% 0.13 145); }
  .pub-status.accepted  { color: var(--accent); }
  .pub-status.review    { color: oklch(72% 0.11 60); }

  @media (max-width: 720px) {
    .pub { grid-template-columns: 32px 1fr; gap: 12px; }
    .pub-status { grid-column: 2 / -1; padding-top: 4px; }
  }

  /* ─── Projects ──────────────────────────────────────────────────────── */
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  @media (max-width: 880px) {
    .proj-grid { grid-template-columns: 1fr; }
  }
  .proj {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px;
    background: oklch(15% 0.02 260 / 0.4);
    position: relative;
    overflow: hidden;
    transition: all .3s;
  }
  .proj:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }
  .proj::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity .3s;
  }
  .proj:hover::before { opacity: 1; }
  .proj-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }
  .proj-mark {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .proj-icon {
    width: 32px;
    height: 32px;
    border: 1px solid var(--line);
    border-radius: 50%;
    display: grid;
    place-items: center;
  }
  .proj-icon svg { color: var(--accent); }
  .proj h3 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    line-height: 1.15;
    margin: 0 0 12px;
  }
  .proj p {
    color: var(--ink-mute);
    font-size: 14px;
    line-height: 1.6;
    margin: 0 0 24px;
  }
  .proj-date {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    text-transform: uppercase;
    border-top: 1px solid var(--line-soft);
    padding-top: 16px;
  }

  /* ─── Skills ────────────────────────────────────────────────────────── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
  @media (max-width: 880px) {
    .skills-grid { grid-template-columns: 1fr; }
  }
  .skill-group h4 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .skill-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .skill-list li {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 13px;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--ink-mute);
    transition: all .2s;
  }
  .skill-list li:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── Achievements ──────────────────────────────────────────────────── */
  .ach-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 64px;
  }
  @media (max-width: 880px) { .ach-list { grid-template-columns: 1fr; } }
  .ach {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 18px;
    padding: 22px 0;
    border-top: 1px solid var(--line-soft);
    align-items: start;
  }
  .ach:first-child, .ach:nth-child(2) { border-top: 1px solid var(--line); }
  .ach-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    padding-top: 3px;
  }
  .ach-body {
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
  }
  .ach-body b { font-weight: 500; color: var(--ink); }

  /* ─── Contact ───────────────────────────────────────────────────────── */
  .contact {
    background:
      radial-gradient(700px 400px at 50% 0%, oklch(40% 0.10 260 / 0.45), transparent 65%);
    border-top: 1px solid var(--line-soft);
    text-align: center;
    padding: 140px 0 80px;
  }
  .contact h2 {
    font-family: var(--serif);
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin: 0 0 20px;
  }
  .contact h2 em { font-style: italic; color: var(--accent); }
  .contact p {
    color: var(--ink-mute);
    font-size: 17px;
    max-width: 50ch;
    margin: 0 auto 40px;
  }
  .contact-grid {
    max-width: 540px;
    margin: 0 auto 56px;
    display: grid;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .contact-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    background: oklch(15% 0.02 260);
    padding: 16px 20px;
    align-items: center;
    text-align: left;
    text-decoration: none;
    color: var(--ink);
    transition: background .2s;
  }
  .contact-row:hover { background: oklch(18% 0.024 260); }
  .contact-row .k {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .contact-row .v {
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
  }
  .socials {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 64px;
  }
  .social {
    width: 44px;
    height: 44px;
    border: 1px solid var(--line);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--ink-mute);
    transition: all .2s;
    text-decoration: none;
  }
  .social:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  /* ─── Footer ────────────────────────────────────────────────────────── */
  .foot {
    border-top: 1px solid var(--line-soft);
    padding: 28px 0;
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .foot a { color: var(--ink-mute); text-decoration: none; }
  .foot a:hover { color: var(--accent); }

  /* ─── Training-pipeline rail (fixed, left side) ─────────────────── */
  .rail {
    position: fixed;
    top: 50%;
    left: 28px;
    transform: translateY(-50%);
    z-index: 40;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 18px 16px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: oklch(13% 0.02 260 / 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .rail::before {
    content: "";
    position: absolute;
    left: 50%; top: 18px; bottom: 18px;
    width: 1px;
    background: var(--line);
    transform: translateX(-0.5px);
  }
  .rail a {
    position: relative;
    width: 20px;
    height: 48px;
    display: grid;
    place-items: center;
    text-decoration: none;
    color: var(--ink-dim);
    transition: color .25s;
  }
  .rail a .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--ink-mute);
    transition: all .3s ease;
    position: relative;
    z-index: 2;
  }
  .rail a .num {
    position: absolute;
    right: 32px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    white-space: nowrap;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    background: oklch(15% 0.02 260 / 0.9);
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--line);
    text-transform: uppercase;
  }
  .rail a:hover .num { opacity: 1; transform: translateY(-50%) translateX(-6px); }
  .rail a.active .dot {
    border-color: var(--phase, var(--accent));
    background: var(--phase, var(--accent));
    box-shadow: 0 0 14px var(--phase, var(--accent));
    transform: scale(1.25);
  }
  .rail a.done .dot {
    background: var(--ink-mute);
    border-color: var(--ink-mute);
  }
  @media (max-width: 1100px) { .rail { display: none; } }

  /* ─── Phase eyebrow & glyph (per-section header) ───────────────── */
  .phase-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 48px;
  }
  .phase-eyebrow {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--phase, var(--accent));
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 0 18px;
  }
  .phase-eyebrow .pn {
    display: inline-grid;
    place-items: center;
    width: 26px; height: 26px;
    border: 1px solid var(--phase, var(--accent));
    border-radius: 50%;
    color: var(--phase, var(--accent));
    font-size: 10px;
    background: oklch(13% 0.02 260);
  }
  .phase-eyebrow .pname { color: var(--phase, var(--accent)); }
  .phase-eyebrow .pdash { color: var(--ink-dim); }
  .phase-eyebrow .ptag {
    color: var(--ink-mute);
    font-style: italic;
    text-transform: none;
    letter-spacing: 0.02em;
    font-family: var(--serif);
    font-size: 16px;
  }
  .phase-glyph {
    width: 200px;
    height: 100px;
    color: var(--phase, var(--accent));
    flex-shrink: 0;
  }
  .phase-glyph svg { width: 100%; height: 100%; overflow: visible; }
  @media (max-width: 720px) {
    .phase-head { grid-template-columns: 1fr; }
    .phase-glyph { width: 160px; height: 80px; }
  }

  /* ─── Inline link styling ──────────────────────────────────────── */
  .lnk {
    color: inherit;
    text-decoration: none;
    background-image: linear-gradient(currentColor, currentColor);
    background-size: 100% 1px;
    background-repeat: no-repeat;
    background-position: 0 100%;
    transition: color .2s, background-size .2s;
  }
  .lnk:hover {
    color: var(--phase, var(--accent));
  }
  .lnk .ext {
    display: inline-block;
    margin-left: 4px;
    opacity: 0.55;
    transform: translateY(-1px);
    transition: opacity .2s, transform .2s;
  }
  .lnk:hover .ext { opacity: 1; transform: translateY(-2px) translateX(1px); }

  /* role title can be a link */
  .exp-role-title.lnk {
    background-size: 0% 1px;
    background-image: linear-gradient(var(--phase, var(--accent)), var(--phase, var(--accent)));
  }
  .exp-role-title.lnk:hover { background-size: 100% 1px; color: var(--phase, var(--accent)); }

  .pub-title.lnk {
    background-size: 0% 1px;
    background-image: linear-gradient(var(--phase, var(--accent)), var(--phase, var(--accent)));
  }
  .pub-title.lnk:hover { background-size: 100% 1px; }
  .pub:hover .pub-title { color: var(--phase, var(--accent)); }

  /* override the existing eyebrow ::before bar to use phase hue */
  /* --phase is composed from a hue (set per-section via --phase-h) plus
     theme-dependent lightness/chroma so colored accents stay legible in
     both light and dark. */
  section {
    --phase-l: 78%;
    --phase-c: 0.13;
    --phase: oklch(var(--phase-l) var(--phase-c) var(--phase-h, 75));
  }

  /* ─── Per-section animated backdrop ───────────────────────────── */
  section { isolation: isolate; }
  .section-bg {
    position: absolute;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
    color: var(--phase, var(--accent));
    /* fade in/out at section edges so the motif blends */
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 12%, black 88%, transparent 100%);
            mask-image: linear-gradient(180deg, transparent 0%, black 12%, black 88%, transparent 100%);
  }
  .bd-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ─── Data-section social logos ─────────────────────────────────── */
  .data-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid var(--line-soft);
  }
  .data-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px 10px 13px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-mute);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: all .2s;
    background: oklch(15% 0.02 260 / 0.4);
  }
  .data-link svg { transition: transform .2s; }
  .data-link:hover {
    border-color: var(--phase, var(--accent));

<style id="theme-light">
  /* ─────────────────────────────────────────────────────────────────
     LIGHT THEME · warm paper + slate ink, deepened amber accent.

     ───────────────────────────────────────────────────────────────── */
  :root[data-theme="light"] {
    --bg:        oklch(96.5% 0.006 85);
    --bg-soft:   oklch(93.5% 0.008 85);
    --bg-card:   oklch(98.5% 0.004 85);
    --ink:       oklch(28% 0.022 265);
    --ink-mute:  oklch(46% 0.022 265);
    --ink-dim:   oklch(58% 0.02 265);

    --line-soft: oklch(28% 0.04 265 / 0.07);
    --accent:    oklch(56% 0.15 56);

  /* backdrops */
  :root[data-theme="light"] #loader {
    background: radial-gradient(ellipse at 50% 45%, oklch(98.5% 0.004 85) 0%, oklch(94% 0.008 85) 70%);

  :root[data-theme="light"] .cosmos {

  :root[data-theme="light"] .cosmos::after {

  /* glassy surfaces → light glass */

  :root[data-theme="light"] .contact-row     { background: oklch(98.5% 0.004 85); }

  :root[data-theme="light"] .rail            { background: oklch(98.5% 0.004 85 / 0.72); }

  :root[data-theme="light"] .contact {
    background: radial-gradient(700px 400px at 50% 0%, oklch(78% 0.08 75 / 0.3), transparent 65%);

  /* ─── Theme toggle (used on site + blog) ─────────────────────────── */
  .theme-toggle {
    display: inline-grid;
    place-items: center;
    width: 38px; height: 38px;
    border: 1px solid var(--line);
    border-radius: 50%;

  /* rail dots derive their hue the same theme-aware way as sections */

<body>
  <!-- ── PRE-REACT LOADER · 3-2-3 forward pass ─────────────────────── -->
  <div id="loader" role="status" aria-label="Loading portfolio">
    <div class="ld-stack">
      <svg class="ld-nn" data-t="0" viewBox="-100 -60 200 120" aria-hidden="true">
        <!-- wavefront glow & line -->
        <line class="ld-wave-glow" x1="0" y1="-50" x2="0" y2="50" data-wave-glow="1"/>
        <line class="ld-wave"      x1="0" y1="-46" x2="0" y2="46" data-wave="1"/>
        <!-- edges L0 → L1 -->
        <g class="ld-edges">
          <line class="ld-edge" data-e="01" x1="-60" y1="-32" x2="0" y2="-16"/>
          <line class="ld-edge" data-e="01" x1="-60" y1="-32" x2="0" y2="16"/>
          <line class="ld-edge" data-e="01" x1="-60" y1="0"   x2="0" y2="-16"/>
          <line class="ld-edge" data-e="01" x1="-60" y1="0"   x2="0" y2="16"/>
          <line class="ld-edge" data-e="01" x1="-60" y1="32"  x2="0" y2="-16"/>
          <line class="ld-edge" data-e="01" x1="-60" y1="32"  x2="0" y2="16"/>
          <!-- edges L1 → L2 -->
          <line class="ld-edge" data-e="12" x1="0" y1="-16" x2="60" y2="-32"/>
          <line class="ld-edge" data-e="12" x1="0" y1="-16" x2="60" y2="0"/>
          <line class="ld-edge" data-e="12" x1="0" y1="-16" x2="60" y2="32"/>
          <line class="ld-edge" data-e="12" x1="0" y1="16"  x2="60" y2="-32"/>
          <line class="ld-edge" data-e="12" x1="0" y1="16"  x2="60" y2="0"/>
          <line class="ld-edge" data-e="12" x1="0" y1="16"  x2="60" y2="32"/>
        </g>
        <!-- nodes -->
        <g class="ld-nodes">
          <circle class="ld-node l0" cx="-60" cy="-32" r="5"/>
          <circle class="ld-node l0" cx="-60" cy="0"   r="5"/>
          <circle class="ld-node l0" cx="-60" cy="32"  r="5"/>
          <circle class="ld-node l1" cx="0"   cy="-16" r="5"/>
          <circle class="ld-node l1" cx="0"   cy="16"  r="5"/>
          <circle class="ld-node l2" cx="60"  cy="-32" r="5"/>
          <circle class="ld-node l2" cx="60"  cy="0"   r="5"/>
          <circle class="ld-node l2" cx="60"  cy="32"  r="5"/>
        </g>
        <!-- layer labels -->
        <text x="-60" y="56" text-anchor="middle"
              font-family="Geist Mono, monospace" font-size="6.5"
              letter-spacing="0.22em" fill="oklch(60% 0.014 260)">INPUT</text>
        <text x="0"   y="56" text-anchor="middle"
              font-family="Geist Mono, monospace" font-size="6.5"
              letter-spacing="0.22em" fill="oklch(60% 0.014 260)">HIDDEN</text>
        <text x="60"  y="56" text-anchor="middle"
              font-family="Geist Mono, monospace" font-size="6.5"
              letter-spacing="0.22em" fill="oklch(60% 0.014 260)">OUTPUT</text>
      </svg>
      <div class="ld-meta">
        <span class="ld-title">Forward pass</span>
        <span class="ld-bar"><span class="ld-bar-fill"></span></span>
        <span class="ld-status">Compiling network<span class="ld-dots"></span></span>
      </div>
      <span class="ld-sig">building the portfolio of Suyash Sachdeva</span>
    </div>
  </div>

  <script>
    /* drive the loader's forward-pass animation (pure JS, no React) */
    (function(){
      const nn = document.querySelector('.ld-nn');
      const status = document.querySelector('.ld-status');
      const waveGlow = nn.querySelector('[data-wave-glow]');
      const wave     = nn.querySelector('[data-wave]');
      const edges01 = nn.querySelectorAll('[data-e="01"]');
      const edges12 = nn.querySelectorAll('[data-e="12"]');
      const nodesL0 = nn.querySelectorAll('.l0');
      const nodesL1 = nn.querySelectorAll('.l1');
      const nodesL2 = nn.querySelectorAll('.l2');
      const layers = [-60, 0, 60];
      const msgs = ['Compiling network', 'Loading weights', 'Warming up', 'Almost there'];
      let tick = 0;
      let start = performance.now();
      const stepMs = 700;       // per-layer dwell
      const sweepMs = stepMs * 3;
      let raf;
      const tickStep = () => {
        const now = performance.now();
        const elapsed = (now - start);
        const t = (elapsed % sweepMs) / sweepMs;     // 0..1 across full sweep
        const x = -60 + t * 120;
        wave.setAttribute('x1', x); wave.setAttribute('x2', x);
        waveGlow.setAttribute('x1', x); waveGlow.setAttribute('x2', x);
        wave.classList.add('on');
        waveGlow.classList.add('on');
        // discrete tick (which layer is hot)
        const phase = Math.floor(t * 3); // 0,1,2
        if (phase !== tick) {
          tick = phase;
          nn.setAttribute('data-t', String(phase));
          // light edges based on phase
          edges01.forEach(e => e.classList.toggle('lit', phase === 0 || phase === 1));
          edges12.forEach(e => e.classList.toggle('lit', phase === 1 || phase === 2));
          // light nodes
          nodesL0.forEach(n => n.classList.toggle('lit', phase === 0));
          nodesL1.forEach(n => n.classList.toggle('lit', phase === 1));
          nodesL2.forEach(n => n.classList.toggle('lit', phase === 2));
          // cycle status text every full sweep
          if (phase === 0) {
            const cycle = Math.floor(elapsed / sweepMs);
            status.firstChild.nodeValue = msgs[cycle % msgs.length];
          }
        }
        raf = requestAnimationFrame(tickStep);
      };
      raf = requestAnimationFrame(tickStep);
      // expose stop fn so we can free the loop after the loader hides
      window.__loaderStop = () => { cancelAnimationFrame(raf); };
    })();

    /* hide loader when React app fires app-ready, with a safety timeout */
    (function(){
      const ld = document.getElementById('loader');
      let hidden = false;
      const hide = () => {
        if (hidden) return;
        hidden = true;
        ld.classList.add('hide');
        setTimeout(() => {
          if (window.__loaderStop) window.__loaderStop();
          ld.remove();
          // Now kick off the heavy canvas backdrop, after first paint
          window.dispatchEvent(new CustomEvent('start-cosmos'));
        }, 600);
      };
      window.addEventListener('app-ready', hide, { once: true });
      // Safety: hide after 15s no matter what so user is never stuck
      setTimeout(hide, 15000);
    })();
  </script>

  <div class="cosmos"></div>
  <canvas id="stars"></canvas>
  <div id="root"></div>

  <script>
    /* ── phase-aware neural backdrop ───────────────────────────────
       morphs particle behaviour and tint to match the current
       training-pipeline phase (data → preprocessing → architecture
       → loss → optimizer → training).  the React app sets
       window.__phase by dispatching 'phase-change' events. */
    (function(){
      const c = document.getElementById('stars');
      const ctx = c.getContext('2d');
      let W = 0, H = 0, DPR = 1;
      let nodes = [];
      let pulses = [];
      let raf;

      const CONFIGS = {
        hero:         { edgeR: 140, pulse: 1100, hue: 75,  drift: 0.045, density: 32000 },
        about:        { edgeR: 70,  pulse: 1700, hue: 75,  drift: 0.05,  density: 38000 },
        experience:   { edgeR: 130, pulse: 1300, hue: 195, drift: 0.04,  density: 34000 },
        research:     { edgeR: 160, pulse: 1100, hue: 285, drift: 0.035, density: 30000 },
        projects:     { edgeR: 105, pulse: 1300, hue: 25,  drift: 0.04,  density: 34000 },
        skills:       { edgeR: 95,  pulse: 1400, hue: 145, drift: 0.04,  density: 34000 },
        achievements: { edgeR: 125, pulse: 1300, hue: 235, drift: 0.04,  density: 32000 },
        contact:      { edgeR: 140, pulse: 1200, hue: 75,  drift: 0.045, density: 32000 },
      };
      let cur = { ...CONFIGS.hero };
      let tgt = { ...CONFIGS.hero };
      /* theme-aware tint: in light mode the particle field must be dark on paper */
      let isLight = document.documentElement.getAttribute('data-theme') === 'light';
      window.addEventListener('theme-change', e => { isLight = (e && e.detail === 'light'); });
      window.__setBackdropPhase = (k) => {
        if (CONFIGS[k]) Object.assign(tgt, CONFIGS[k]);
      };
      window.addEventListener('phase-change', e => window.__setBackdropPhase(e.detail));

      function resize(){
        DPR = Math.min(devicePixelRatio || 1, 2);
        W = innerWidth; H = innerHeight;
        c.width  = W * DPR;
        c.height = H * DPR;
        c.style.width  = W+'px';
        c.style.height = H+'px';
        ctx.setTransform(DPR,0,0,DPR,0,0);
        // Density: leaner on small screens / coarse pointers.
        const isMobile  = W < 720 || matchMedia('(pointer:coarse)').matches;
        const isReduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
        const divisor = isReduced ? 120000 : isMobile ? 80000 : 44000;
        const target = Math.max(20, Math.round((W * H) / divisor));
        nodes = new Array(target).fill(0).map(() => ({
          x: Math.random()*W,
          y: Math.random()*H,
          vx: (Math.random()-0.5)*0.04,
          vy: (Math.random()-0.5)*0.04,
          r: Math.random()<0.85 ? 1.0 : 1.5,
          a: Math.random()*0.25 + 0.15,
        }));
      }

      function lerpAngle(a, b, k){
        let d = b - a;
        if (d > 180) d -= 360;
        if (d < -180) d += 360;
        return (a + d * k + 360) % 360;
      }
      function lerpConfig(dt){
        // slow morph — ~3s to settle
        const k = Math.min(0.0018 * dt, 0.04);
        cur.edgeR += (tgt.edgeR - cur.edgeR) * k;
        cur.drift += (tgt.drift - cur.drift) * k;
        cur.pulse += (tgt.pulse - cur.pulse) * k;
        cur.hue    = lerpAngle(cur.hue, tgt.hue, k);
      }

      function applyForces(dt){
        // pure gentle drift — no per-phase formation forces.
        // phase changes are communicated via tint, density and pulse rate only.
        for (const n of nodes){
          n.vx *= 0.978;
          n.vy *= 0.978;
          n.vx += (Math.random() - 0.5) * cur.drift * 0.045;
          n.vy += (Math.random() - 0.5) * cur.drift * 0.045;
          n.x += n.vx * dt * 0.55;
          n.y += n.vy * dt * 0.55;
          if (n.x < -20) n.x = W+20;
          if (n.x > W+20) n.x = -20;
          if (n.y < -20) n.y = H+20;
          if (n.y > H+20) n.y = -20;
        }
      }

      function spawnPulse(){
        if (!nodes.length) return;
        const a = nodes[(Math.random()*nodes.length)|0];
        let best = null, bd = 240*240;
        for (const n of nodes){
          if (n===a) continue;
          const dx = n.x-a.x, dy = n.y-a.y, d = dx*dx+dy*dy;
          if (d<bd){ bd=d; best=n; }
        }
        if (best) pulses.push({ a, b: best, t: 0 });
      }

      let last = performance.now();
      let pulseTimer = 0;
      function frame(now){
        const dt = Math.min(40, now-last); last = now;
        ctx.clearRect(0,0,W,H);
        lerpConfig(dt);
        applyForces(dt);

        const hueI = cur.hue | 0;

        // edges
        const R = cur.edgeR, R2 = R*R;
        if (R > 5){
          ctx.lineWidth = 1;
          for (let i=0;i<nodes.length;i++){
            for (let j=i+1;j<nodes.length;j++){
              const a = nodes[i], b = nodes[j];
              const dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy;
              if (d2 < R2){
                const t = 1 - Math.sqrt(d2)/R;
                const alpha = t * (isLight ? 0.075 : 0.055);
                ctx.strokeStyle = `oklch(${isLight ? '52%' : '72%'} 0.06 ${hueI} / ${alpha})`;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
              }
            }
          }
        }

        // nodes
        for (const n of nodes){
          ctx.fillStyle = `oklch(${isLight ? '44%' : '92%'} 0.03 ${hueI} / ${n.a * (isLight ? 1.05 : 0.85)})`;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
          ctx.fill();
        }

        // pulses — slower and softer
        pulseTimer += dt;
        if (cur.pulse > 100 && pulseTimer > cur.pulse){ spawnPulse(); pulseTimer = 0; }
        for (let i=pulses.length-1; i>=0; i--){
          const p = pulses[i];
          p.t += dt * 0.0008;
          if (p.t >= 1){ pulses.splice(i,1); continue; }
          const x = p.a.x + (p.b.x - p.a.x) * p.t;
          const y = p.a.y + (p.b.y - p.a.y) * p.t;
          const g = ctx.createRadialGradient(x,y,0,x,y,9);
          g.addColorStop(0, `oklch(${isLight ? '55%' : '82%'} 0.13 ${hueI} / 0.7)`);
          g.addColorStop(1, `oklch(${isLight ? '55%' : '82%'} 0.13 ${hueI} / 0)`);
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = `oklch(${isLight ? '50%' : '94%'} 0.05 ${hueI} / 0.85)`;
          ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
        }

        raf = requestAnimationFrame(frame);
      }

      let t; addEventListener('resize', ()=>{ clearTimeout(t); t=setTimeout(resize,160); });
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(raf);
        else { last = performance.now(); raf = requestAnimationFrame(frame); }
      });
      // Don't start immediately — wait for the app-ready signal so the
      // canvas loop doesn't compete with Babel compilation + first paint.
      const start = () => {
        if (raf) return;          // already running
        resize();
        last = performance.now();
        raf = requestAnimationFrame(frame);
      };
      window.addEventListener('start-cosmos', start, { once: true });
      // Safety fallback in case the loader path is skipped
      setTimeout(() => { if (!raf) start(); }, 16000);
    })();
  </script>
