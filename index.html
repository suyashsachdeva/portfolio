<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Suyash Sachdeva — Deep Learning Researcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        oklch(13% 0.02 260);
    --bg-soft:   oklch(16% 0.022 260);
    --bg-card:   oklch(17% 0.024 260);
    --ink:       oklch(94% 0.012 85);
    --ink-mute:  oklch(78% 0.014 85);
    --ink-dim:   oklch(60% 0.014 260);
    --line:      oklch(94% 0.012 85 / 0.14);
    --line-soft: oklch(94% 0.012 85 / 0.07);
    --accent:    oklch(82% 0.12 75);
    --accent-d:  oklch(70% 0.13 70);
    --serif: "Newsreader", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --sans:  "Geist", ui-sans-serif, system-ui, sans-serif;
    --mono:  "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --maxw: 1180px;
    --pad:  clamp(20px, 4vw, 56px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 400;
    font-size: 15.5px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ─── Neural backdrop ───────────────────────────────────────────────── */
  .cosmos {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(1100px 720px at 82% -10%, oklch(38% 0.09 260 / 0.38), transparent 60%),
      radial-gradient(900px 600px at 8% 110%, oklch(38% 0.08 30 / 0.18), transparent 60%),
      linear-gradient(180deg, oklch(13% 0.02 260) 0%, oklch(11% 0.022 260) 100%);
  }
  .cosmos::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(oklch(94% 0.01 85 / 0.025) 1px, transparent 1px),
      linear-gradient(90deg, oklch(94% 0.01 85 / 0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask: radial-gradient(ellipse at center, black 20%, transparent 80%);
  }
  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── Page frame ────────────────────────────────────────────────────── */
  #root { position: relative; z-index: 2; }
  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding-left: var(--pad);
    padding-right: var(--pad);
  }

  /* ─── Nav ───────────────────────────────────────────────────────────── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: oklch(13% 0.02 260 / 0.65);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .brand {
    font-family: var(--serif);
    font-size: 22px;
    letter-spacing: 0.01em;
  }
  .brand .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 8px 3px 0;
    vertical-align: middle;
    box-shadow: 0 0 12px var(--accent);
  }
  .nav-links {
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .nav-links a {
    color: var(--ink-mute);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.04em;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.active { color: var(--accent); }
  .nav-cta {
    border: 1px solid var(--line);
    padding: 8px 16px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    transition: all .2s;
  }
  .nav-cta:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  @media (max-width: 720px) {
    .nav-links { display: none; }
  }

  /* ─── Section heads ─────────────────────────────────────────────────── */
  section { padding: 96px 0; position: relative; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .eyebrow::before {
    content: "";
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .sec-title {
    font-family: var(--serif);
    font-size: clamp(34px, 4.6vw, 52px);
    font-weight: 400;
    line-height: 1.08;
    letter-spacing: -0.015em;
    margin: 0 0 16px;
  }
  .sec-sub {
    color: var(--ink-mute);
    font-size: 16px;
    max-width: 56ch;
    margin: 0;
  }
  .sec-head {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 48px;
  }

  /* ─── Hero ──────────────────────────────────────────────────────────── */
  .hero { padding: 120px 0 110px; position: relative; }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 64px;
    align-items: center;
  }
  @media (max-width: 880px) {
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  }
  .hero-meta {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    align-items: center;
  }
  .hero-meta .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: oklch(72% 0.14 145);
    box-shadow: 0 0 0 0 oklch(72% 0.14 145 / 0.6);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 oklch(72% 0.14 145 / 0.55); }
    70%  { box-shadow: 0 0 0 10px oklch(72% 0.14 145 / 0); }
    100% { box-shadow: 0 0 0 0 oklch(72% 0.14 145 / 0); }
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(54px, 7.6vw, 96px);
    line-height: 1.02;
    letter-spacing: -0.022em;
    margin: 0 0 24px;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .hero-tag {
    color: var(--ink-mute);
    font-size: 18px;
    line-height: 1.6;
    max-width: 52ch;
    margin: 0 0 32px;
  }
  .hero-cta-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 22px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
    cursor: pointer;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
  }
  .btn.primary {
    background: var(--accent);
    color: oklch(20% 0.04 60);
    border-color: var(--accent);
  }
  .btn.primary:hover {
    background: transparent;
    color: var(--accent);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn .arrow { transition: transform .2s; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* hero neural net */
  .orbit-wrap {
    position: relative;
    aspect-ratio: 1;
    display: grid;
    place-items: center;
  }
  .nn-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .nn-svg .edge {
    stroke: var(--line);
    stroke-width: 0.6;
    fill: none;
  }
  .nn-svg .edge.hot {
    stroke: var(--accent);
    stroke-width: 0.9;
    opacity: 0.7;
  }
  .nn-svg .node {
    fill: var(--bg);
    stroke: var(--ink-mute);
    stroke-width: 0.8;
  }
  .nn-svg .node.in    { stroke: var(--ink-mute); }
  .nn-svg .node.hidden{ stroke: var(--accent-d); }
  .nn-svg .node.out   {
    fill: var(--accent);
    stroke: var(--accent);
    filter: drop-shadow(0 0 8px oklch(82% 0.12 75 / 0.5));
  }
  .nn-svg .layer-label {
    font-family: var(--mono);
    font-size: 6px;
    letter-spacing: 0.22em;
    fill: var(--ink-dim);
    text-transform: uppercase;
  }
  .nn-svg .activation {
    fill: var(--accent);
  }
  @keyframes pulseNode {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }
  .nn-svg .node.live { animation: pulseNode 3.2s ease-in-out infinite; }
  .nn-svg .node.live.d1 { animation-delay: .4s; }
  .nn-svg .node.live.d2 { animation-delay: .8s; }
  .nn-svg .node.live.d3 { animation-delay: 1.2s; }
  .nn-svg .node.live.d4 { animation-delay: 1.6s; }
  @keyframes flow {
    0%   { stroke-dashoffset: 60; opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }
  .nn-svg .signal {
    stroke: var(--accent);
    stroke-width: 1.1;
    fill: none;
    stroke-dasharray: 4 56;
    animation: flow 3.6s linear infinite;
  }
  .nn-svg .signal.s2 { animation-delay: 1.2s; }
  .nn-svg .signal.s3 { animation-delay: 2.4s; }
  .nn-svg .signal.s4 { animation-delay: 0.6s; }
  .nn-svg .signal.s5 { animation-delay: 1.8s; }

  /* ─── About ─────────────────────────────────────────────────────────── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 80px;
    align-items: start;
  }
  @media (max-width: 880px) {
    .about-grid { grid-template-columns: 1fr; gap: 40px; }
  }
  .about-body p {
    font-family: var(--serif);
    font-size: clamp(22px, 2.4vw, 28px);
    line-height: 1.45;
    font-weight: 400;
    margin: 0 0 24px;
    color: var(--ink);
  }
  .about-body p + p { font-size: 17px; font-family: var(--sans); color: var(--ink-mute); line-height: 1.7; }
  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px 24px;
    padding-top: 16px;
  }
  .stat .n {
    font-family: var(--serif);
    font-size: 44px;
    line-height: 1;
    color: var(--accent);
    display: block;
    margin-bottom: 6px;
  }
  .stat .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  /* ─── Experience ────────────────────────────────────────────────────── */
  .exp-list { display: grid; gap: 0; }
  .exp-item {
    display: grid;
    grid-template-columns: 180px 1fr auto;
    gap: 40px;
    padding: 32px 0;
    border-top: 1px solid var(--line);
    align-items: start;
    transition: padding-left .3s;
  }
  .exp-item:last-child { border-bottom: 1px solid var(--line); }
  .exp-item:hover { padding-left: 16px; }
  .exp-date {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding-top: 4px;
  }
  .exp-role {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    line-height: 1.2;
    margin: 0 0 4px;
  }
  .exp-co {
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 0.04em;
    margin: 0 0 14px;
  }
  .exp-co span { color: var(--ink-dim); margin-left: 8px; }
  .exp-bullets {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .exp-bullets li {
    color: var(--ink-mute);
    font-size: 15px;
    line-height: 1.6;
    padding-left: 18px;
    position: relative;
    margin-bottom: 6px;
  }
  .exp-bullets li::before {
    content: "";
    position: absolute;
    left: 0; top: 11px;
    width: 8px;
    height: 1px;
    background: var(--accent);
  }
  .exp-tags {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-mute);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  @media (max-width: 880px) {
    .exp-item { grid-template-columns: 1fr; gap: 12px; }
    .exp-tags { flex-direction: row; flex-wrap: wrap; align-items: flex-start; }
  }

  /* ─── Research ──────────────────────────────────────────────────────── */
  .tabs {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 999px;
    margin-bottom: 40px;
  }
  .tab {
    background: transparent;
    border: 0;
    color: var(--ink-mute);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .2s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    background: var(--accent);
    color: oklch(20% 0.04 60);
  }
  .pub-list { display: grid; gap: 0; }
  .pub {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 24px;
    padding: 24px 0;
    border-top: 1px solid var(--line);
    cursor: default;
    transition: background .3s;
  }
  .pub:last-child { border-bottom: 1px solid var(--line); }
  .pub:hover { background: oklch(94% 0.012 85 / 0.025); }
  .pub-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    padding-top: 6px;
  }
  .pub-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    line-height: 1.3;
    margin: 0 0 8px;
    transition: color .2s;
  }
  .pub:hover .pub-title { color: var(--accent); }
  .pub-venue {
    color: var(--ink-mute);
    font-size: 14px;
    font-style: italic;
  }
  .pub-status {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding-top: 8px;
    white-space: nowrap;
  }
  .pub-status.published { color: oklch(75% 0.13 145); }
  .pub-status.accepted  { color: var(--accent); }
  .pub-status.review    { color: oklch(72% 0.11 60); }

  @media (max-width: 720px) {
    .pub { grid-template-columns: 32px 1fr; gap: 12px; }
    .pub-status { grid-column: 2 / -1; padding-top: 4px; }
  }

  /* ─── Projects ──────────────────────────────────────────────────────── */
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  @media (max-width: 880px) {
    .proj-grid { grid-template-columns: 1fr; }
  }
  .proj {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px;
    background: oklch(15% 0.02 260 / 0.4);
    position: relative;
    overflow: hidden;
    transition: all .3s;
  }
  .proj:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }
  .proj::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity .3s;
  }
  .proj:hover::before { opacity: 1; }
  .proj-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }
  .proj-mark {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .proj-icon {
    width: 32px;
    height: 32px;
    border: 1px solid var(--line);
    border-radius: 50%;
    display: grid;
    place-items: center;
  }
  .proj-icon svg { color: var(--accent); }
  .proj h3 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    line-height: 1.15;
    margin: 0 0 12px;
  }
  .proj p {
    color: var(--ink-mute);
    font-size: 14px;
    line-height: 1.6;
    margin: 0 0 24px;
  }
  .proj-date {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    text-transform: uppercase;
    border-top: 1px solid var(--line-soft);
    padding-top: 16px;
  }

  /* ─── Skills ────────────────────────────────────────────────────────── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
  @media (max-width: 880px) {
    .skills-grid { grid-template-columns: 1fr; }
  }
  .skill-group h4 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .skill-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .skill-list li {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 13px;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--ink-mute);
    transition: all .2s;
  }
  .skill-list li:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── Achievements ──────────────────────────────────────────────────── */
  .ach-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 64px;
  }
  @media (max-width: 880px) { .ach-list { grid-template-columns: 1fr; } }
  .ach {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 18px;
    padding: 22px 0;
    border-top: 1px solid var(--line-soft);
    align-items: start;
  }
  .ach:first-child, .ach:nth-child(2) { border-top: 1px solid var(--line); }
  .ach-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    padding-top: 3px;
  }
  .ach-body {
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
  }
  .ach-body b { font-weight: 500; color: var(--ink); }

  /* ─── Contact ───────────────────────────────────────────────────────── */
  .contact {
    background:
      radial-gradient(700px 400px at 50% 0%, oklch(40% 0.10 260 / 0.45), transparent 65%);
    border-top: 1px solid var(--line-soft);
    text-align: center;
    padding: 140px 0 80px;
  }
  .contact h2 {
    font-family: var(--serif);
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin: 0 0 20px;
  }
  .contact h2 em { font-style: italic; color: var(--accent); }
  .contact p {
    color: var(--ink-mute);
    font-size: 17px;
    max-width: 50ch;
    margin: 0 auto 40px;
  }
  .contact-grid {
    max-width: 540px;
    margin: 0 auto 56px;
    display: grid;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .contact-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    background: oklch(15% 0.02 260);
    padding: 16px 20px;
    align-items: center;
    text-align: left;
    text-decoration: none;
    color: var(--ink);
    transition: background .2s;
  }
  .contact-row:hover { background: oklch(18% 0.024 260); }
  .contact-row .k {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .contact-row .v {
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
  }
  .socials {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 64px;
  }
  .social {
    width: 44px;
    height: 44px;
    border: 1px solid var(--line);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--ink-mute);
    transition: all .2s;
    text-decoration: none;
  }
  .social:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  /* ─── Footer ────────────────────────────────────────────────────────── */
  .foot {
    border-top: 1px solid var(--line-soft);
    padding: 28px 0;
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .foot a { color: var(--ink-mute); text-decoration: none; }
  .foot a:hover { color: var(--accent); }

  /* fade-in on scroll */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity .9s ease, transform .9s ease;
  }
  .reveal.in {
    opacity: 1;
    transform: none;
  }
</style>
</head>
<body>
  <div class="cosmos"></div>
  <canvas id="stars"></canvas>
  <div id="root"></div>

  <script>
    /* ── neural backdrop: drifting nodes + nearest-neighbour edges,
          with occasional signal pulses traveling along edges ────────── */
    (function(){
      const c = document.getElementById('stars');
      const ctx = c.getContext('2d');
      let W = 0, H = 0, DPR = 1;
      let nodes = [];
      let pulses = [];
      let raf;

      function resize(){
        DPR = Math.min(devicePixelRatio || 1, 2);
        W = innerWidth; H = innerHeight;
        c.width  = W * DPR;
        c.height = H * DPR;
        c.style.width  = W+'px';
        c.style.height = H+'px';
        ctx.setTransform(DPR,0,0,DPR,0,0);
        const target = Math.round((W * H) / 22000);
        nodes = new Array(target).fill(0).map(() => ({
          x: Math.random()*W,
          y: Math.random()*H,
          vx: (Math.random()-0.5)*0.06,
          vy: (Math.random()-0.5)*0.06,
          r: Math.random()<0.85 ? 1.0 : 1.6,
          a: Math.random()*0.35 + 0.18,
        }));
      }

      function spawnPulse(){
        if (!nodes.length) return;
        const a = nodes[(Math.random()*nodes.length)|0];
        // find nearest neighbour within radius
        let best = null, bd = 200*200;
        for (const n of nodes){
          if (n===a) continue;
          const dx = n.x-a.x, dy = n.y-a.y, d = dx*dx+dy*dy;
          if (d<bd){ bd=d; best=n; }
        }
        if (best) pulses.push({ a, b: best, t: 0, life: 1.0 });
      }

      let last = performance.now();
      let pulseTimer = 0;
      function frame(now){
        const dt = Math.min(40, now-last); last = now;
        ctx.clearRect(0,0,W,H);

        // drift
        for (const n of nodes){
          n.x += n.vx * dt * 0.5;
          n.y += n.vy * dt * 0.5;
          if (n.x < -20) n.x = W+20;
          if (n.x > W+20) n.x = -20;
          if (n.y < -20) n.y = H+20;
          if (n.y > H+20) n.y = -20;
        }

        // edges
        const R = 150, R2 = R*R;
        ctx.lineWidth = 1;
        for (let i=0;i<nodes.length;i++){
          for (let j=i+1;j<nodes.length;j++){
            const a = nodes[i], b = nodes[j];
            const dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy;
            if (d2 < R2){
              const t = 1 - Math.sqrt(d2)/R;
              const alpha = t * 0.07;
              ctx.strokeStyle = `oklch(78% 0.06 75 / ${alpha})`;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }
        }

        // nodes
        for (const n of nodes){
          ctx.fillStyle = `oklch(94% 0.012 85 / ${n.a})`;
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
          ctx.fill();
        }

        // pulses
        pulseTimer += dt;
        if (pulseTimer > 700){ spawnPulse(); pulseTimer = 0; }
        for (let i=pulses.length-1; i>=0; i--){
          const p = pulses[i];
          p.t += dt * 0.0012;
          if (p.t >= 1){ pulses.splice(i,1); continue; }
          const x = p.a.x + (p.b.x - p.a.x) * p.t;
          const y = p.a.y + (p.b.y - p.a.y) * p.t;
          const g = ctx.createRadialGradient(x,y,0,x,y,9);
          g.addColorStop(0, 'oklch(82% 0.13 75 / 0.85)');
          g.addColorStop(1, 'oklch(82% 0.13 75 / 0)');
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = 'oklch(94% 0.05 85 / 0.95)';
          ctx.beginPath(); ctx.arc(x,y,1.6,0,Math.PI*2); ctx.fill();
        }

        raf = requestAnimationFrame(frame);
      }

      let t; addEventListener('resize', ()=>{ clearTimeout(t); t=setTimeout(resize,160); });
      // pause when tab hidden
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(raf);
        else { last = performance.now(); raf = requestAnimationFrame(frame); }
      });
      resize();
      raf = requestAnimationFrame(frame);
    })();
  </script>

  <script type="text/babel" src="app.jsx"></script>
</body>
